      Network operations execute under SOI Edition 04-26, effective 181200ZAPR26 through {{ endex_dtg }}. FM is primary for BN CMD, O/I, FIRES, ADMIN, and MEDEVAC nets; TACSAT is secondary for BN CMD and O/I, with BCT TACSAT channel assignments per SOI. Nett Warrior provides the common operating picture at platoon leader and higher, synchronized with the BN TOC CPOF every 15 minutes. Data services (SharePoint, email) are available at BN Main CP and CTCP via CPN node from BCT signal company.

      The BN S-6 manages organic signal assets and coordinates spectrum use through BCT S-6; JCEOI issued NLT 181600ZAPR26. Frequency-hopping SINCGARS is the standard for all BN nets; single-channel fallback per SOI. COMSEC is loaded NLT 181800ZAPR26 with a 24-hour rollover at 200000ZAPR26; BN S-6 OPCON to CTCP for COMSEC replacement and key management.

      Priority of signal support is BN CMD net, then FIRES net, then O/I, then ADMIN. Retransmission is provided by a single retrans team vic. NK 108 775 to cover the 8-km depth of the AO. Troubleshooting procedures are published in the SOI; any net loss reported to BN S-6 within 5 minutes with channel, callsign, and last known functional time. Tactical call signs listed below are campaign-specific and change with each SOI edition; they are not permanent unit designations.
