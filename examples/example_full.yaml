  - letter: J
    body: |
      Public affairs posture is low-profile; IRON STRIKE is an internal training operation with no embedded media and no planned public release. External release authority rests with the 173d IBCT PAO; BN S-3 routes any inquiry through the BCT PAO without comment. Internal audience messaging emphasizes readiness, airborne infantry proficiency, and the strength of the U.S.–German training partnership at Grafenwoehr.

      Soldiers are reminded of OPSEC responsibilities on personal social media: no grids, no timelines, no unit positions, no casualty information. Command Information products (BN newsletter, post-operation photos) are staged through BCT PAO after {{ endex_dtg }} with OPSEC review. Any host-nation media encounter on the training area is routed to the BCT HN LNO and BCT PAO.
    appendices: []
  - letter: K
    body: |
      Civil-military operations in IRON STRIKE are limited to training-area coordination and host-nation partnership. ALTENSTADT village vic. NK 115 790 is protected as a no-fire area and off-limits to ground maneuver; any inadvertent entry is reported immediately to BN S-3 and BCT HN LNO. Liaison with the Bavarian Forestry Authority and Grafenwoehr Range Control is continuous through the BCT HN LNO for range deconfliction, fire danger level, and wildlife advisories.

      There are no populace and resources control operations, no foreign humanitarian assistance, and no civil administration tasks. Bundeswehr Grafenwoehr Training Area Command is the primary host-nation interface for range infrastructure, ammunition handling, and emergency response. Coordination meetings occur daily at 1700Z at Range Control with BN S-3 representation.
    appendices:
      - number: 1
        title: "Civil-Military Operations Estimate"
        body: |
          Limited CMO footprint; running estimate maintained by BN S-3 civil affairs planner focuses on host-nation coordination and ALTENSTADT village protection.
      - number: 6
        title: "Civil-Military Operations Center (CMOC) Operations"
        body: |
          No CMOC established; CMO coordination flows through BCT HN LNO and Grafenwoehr Range Control. BN S-3 attends daily 1700Z range control meeting.
  - letter: L
    body: |
      Information collection is synchronized to the four PIRs and sequenced by phase. Scout Platoon (TACON to 173 RSTA SQDN through 190430ZAPR26) screens HIGHWAY 22 from 181800ZAPR26, reports any movement south of GRID LINE 80, and provides reconnaissance handover to A Co at PL SILVER. A BCT Puma UAS orbit over OBJ {{ obj_primary }} from 190430ZAPR26 to 190800ZAPR26 cues A Co and STEEL 6 with full-motion video piped to BN TOC. The BCT MICO provides reinforcing SIGINT against enemy C2 nets.

      Priority intelligence requirements are, in order: (1) enemy reinforcement timing and composition along HIGHWAY 22; (2) obstacle belt composition at NK 138 779; (3) Orlan-10 launch and recovery site; (4) location of enemy CP on OBJ {{ obj_primary }}. Collection assets are matched to PIRs in the ISR Synchronization Matrix (App 4) with named areas of interest keyed to decision points from Annex C. S-2 chairs the ICR working group at BN TOC at 181800ZAPR26 and 190000ZAPR26.

      Reconnaissance handover and battle handover criteria are published in Appendix 3; Scout Plt chops back to BN control at 190430ZAPR26 and assumes screen to the north along PL COPPER during Phase III. All collection reports flow on BN O/I net with SALUTE format; time-sensitive PIR triggers use flash-precedence SPOTREP.
    appendices:
      - number: 1
        title: "Information Collection Plan"
        body: |
          PIR-driven collection plan matching assets (Scout Plt, BCT Puma, BCT MICO SIGINT) to NAIs and decision points. Updated every 12 hours by S-2.
      - number: 2
        title: "Information Collection Overlay"
        body: |
          Overlay depicts NAIs along HIGHWAY 22, obstacle belt, OBJ {{ obj_primary }}, and suspected Orlan-10 launch site vic. NK 155 795. Published with base order.
      - number: 3
        title: "Reconnaissance and Surveillance"
        body: |
          Scout Plt screens HIGHWAY 22 from 181800ZAPR26; recon handover to A Co at PL SILVER NLT 190430ZAPR26. R&S matrix published by S-2.
      - number: 4
        title: "ISR Synchronization Matrix"
        body: |
          Matrix aligns collection assets with PIRs, NAIs, decision points, and LTIOV by phase. Updated at each targeting working group.
  - letter: M
    body: |
      The commander's assessment priorities are: (1) seizure of OBJ {{ obj_primary }} NLT 190800ZAPR26; (2) preservation of combat power below 10% casualties across TF IRON; (3) tempo of transition from Phase II decisive to Phase III consolidation. The BN S-3 assessment cell tracks measures of effectiveness and measures of performance against these priorities, with commander-in-the-loop reviews at the 0600Z BUB and 1800Z commander's update brief.

      MOEs include: percent of OBJ {{ obj_primary }} secured; enemy combat power reduction (%); time elapsed from LD to LOA; A Co combat power remaining at seizure. MOPs include: fires delivered on time per the AGM; breach completed NLT 190445ZAPR26; LOGPAC execution rate; CASEVAC time from point of injury to Role 1 under 30 minutes. Indicators are aligned to each MOE/MOP and reported through BN TOC every 6 hours on BN O/I net.

      Assessment products drive re-planning: the S-3 assessment cell produces a written assessment update at each BUB with recommendations for the commander on branch execution, reserve commitment, and transition timing. Post-operation, an AAR at BN level is conducted NLT 202000ZAPR26 with company input, and the product feeds the BCT lessons-learned repository.
    appendices:
      - number: 1
        title: "Assessment Framework"
        body: |
          Three priorities (seizure of OBJ {{ obj_primary }}, combat power preservation, transition tempo) with aligned MOEs, MOPs, and indicators. Framework reviewed at 0600Z BUB.
      - number: 2
        title: "MOE/MOP Matrices"
        body: |
          Matrices align each MOE and MOP to a phase objective, indicator, data source, and reporting frequency. Maintained by BN S-3 assessment cell.
  - letter: N
    body: |
      Space-based enablers are critical to IRON STRIKE. GPS PNT supports all dismounted and mounted navigation; DAGRs are issued to squad leader and higher. SATCOM (MUOS narrowband, TACSAT) provides BN-to-BCT reachback as the secondary communications path. ISR tipping from national and theater space assets flows through the BCT ACE to BN S-2 within 30 minutes of collection. No offensive space effects are planned or authorized.

      The space threat assessment is LOW for IRON STRIKE; however, enemy doctrine includes GPS spoofing and jamming, and the Grafenwoehr training area has historically experienced GPS interference during large exercises. Units carry out pre-mission PNT checks, report any GPS anomaly (drift, sudden fix loss, impossible position) through JSIR on BN O/I net within 15 minutes, and fall back to terrain association and map-and-compass when GPS is degraded.

      The BN space officer (dual-hatted with S-6) maintains the running space estimate, submits space support requests through the BCT space support element, and integrates space considerations into the targeting and fires cycle. SATCOM outages, GPS anomalies, and tipping delays are reported immediately to the BN CDR.
    appendices:
      - number: 1
        title: "Space Support Requests"
        body: |
          BN space officer submits SSRs through BCT SSE for ISR, PNT monitoring, and SATCOM priority. Standing request for MUOS priority during Phase II.
      - number: 2
        title: "Friendly Space Order of Battle"
        body: |
          Relevant friendly space capabilities: GPS, MUOS, WGS, and national/theater ISR. Integrated view maintained by BCT SSE.
      - number: 3
        title: "Threat Space Order of Battle"
        body: |
          Enemy GPS jamming/spoofing assessed POSSIBLE; Orlan-10 cueing from regimental space integration. Report anomalies via JSIR within 15 minutes.
  - letter: P
    body: |
      Bundeswehr Grafenwoehr Training Area Command provides range infrastructure (impact areas, maneuver boxes, ammunition supply point), ammunition handling support at the Grafenwoehr ASP, emergency response reachback (German fire brigade and Red Cross), and POL reachback through host-nation contract. USAG Bavaria handles billeting at Camp Aachen, DFAC services, and garrison support functions. Host-nation coordination runs through the BCT HN LNO, with BN S-3 as the primary action officer at battalion level.

      Daily synchronization meetings occur at 1700Z at Grafenwoehr Range Control; BN S-3 attends in person with the BCT HN LNO. Any coordination with Bavarian civil authorities (police, forestry, civil defense) flows through Range Control and is not executed at BN level without BCT approval. All host-nation interactions comply with the U.S.–Germany Status of Forces Agreement and Grafenwoehr Range SOP.
    appendices: []
  - letter: Q
    body: |
      The knowledge management plan structures the BN battle rhythm to support the commander's decision cycle. The daily rhythm is anchored by the Battle Update Brief at 0600Z, the Commander's Update Brief at 1800Z, and a shift-change brief at every TOC hand-off (0600Z and 1800Z). The targeting working group convenes at 181800ZAPR26 and 190000ZAPR26; the sustainment synchronization meeting is at 1200Z daily at the CTCP.

      The SharePoint portal hosts OPORD, WARNORD, and FRAGO version control with clear numbering (IRON STRIKE OPORD 26-04, FRAGO 01, FRAGO 02) and a change log maintained by the BN XO. The Common Operating Picture is maintained at the BN Main CP on CPOF, synchronized from Nett Warrior updates (maneuver), S-2 SITEMPs (enemy), and S-4 LOGSTAT (sustainment) every 15 minutes. Knowledge products (running estimates, assessments, lessons learned) are stored in the SharePoint BN IRON STRIKE workspace.

      Information management discipline: all staff products carry classification markings (UNCLASSIFIED for this operation), version numbers, and DTG of last update. Email traffic below O-3 is minimized; primary staff communication is the BN TOC CPOF chat and Nett Warrior. The BN XO is the KM authority and resolves portal/COP disputes.
    appendices:
      - number: 1
        title: "Knowledge Management Plan"
        body: |
          Battle rhythm anchored by 0600Z BUB, 1800Z CUB, and shift-change briefs. SharePoint portal versions OPORD/WARNORD/FRAGO products with XO as KM authority.
      - number: 2
        title: "Battle Rhythm"
        body: |
          Daily events: 0600Z BUB, 1200Z sustainment sync, 1800Z CUB, shift-change briefs at hand-off. Targeting working groups at 181800ZAPR26 and 190000ZAPR26.
      - number: 3
        title: "Information Management"
        body: |
          All products marked with classification, version, and DTG. CPOF chat and Nett Warrior are primary staff comms channels; email minimized below O-3.
  - letter: R
    body: |
      Required reports are consolidated to minimize administrative load while preserving commander situational awareness. SITREP is submitted every 6 hours on BN CMD net (0000Z, 0600Z, 1200Z, 1800Z) by every company to BN TOC; format per BN TACSOP. SPOTREP is immediate for any PIR trigger, contact, or significant event; flash precedence on BN O/I net in SALUTE format. LOGSTAT is submitted every 8 hours to S-4 on BN ADMIN net; PERSTAT every 6 hours to S-1 on BN ADMIN net.

      MEDEVAC requests use the 9-line format on BN MEDEVAC net with launch authority at BN TOC; the 15-line IED/UXO report is used for any unexploded ordnance or IED encounter on BN O/I net. Additional reports: Commander's Critical Information Reports (CCIR) trigger immediate voice report to BN CDR through BN TOC; BN SITREP forward to BCT TOC NLT 30 minutes after each 6-hour cycle.

      Report discipline is enforced by the BN TOC battle captain; missed or late reports are logged and addressed at the next BUB. Report formats are published in Appendix 1 and posted at every company CP, BN Main, and CTCP.
    appendices:
      - number: 1
        title: "Report Formats"
        body: |
          SITREP, SPOTREP (SALUTE), LOGSTAT, PERSTAT, 9-line MEDEVAC, 15-line IED/UXO, CCIR. Formats published per BN TACSOP and posted at every CP.
  - letter: S
    body: |
      Special technical operations are not applicable to IRON STRIKE at the UNCLASSIFIED classification level. Any STO coordination required during execution will be published separately through secure channels and distributed only to personnel with appropriate clearance and need-to-know. Refer questions to the BCT S-3 STO cell.
    appendices: []
  - letter: U
    body: |
      Inspector General support is provided by the 173d IBCT IG. No inspections, investigations, or assistance visits are scheduled during the 48-hour operation window of IRON STRIKE. The battalion maintains an open-door policy for Soldiers at all levels; complaints and IG assistance requests flow through the chain of command or, if a Soldier prefers, directly through the BN CSM to the BCT IG. Contact information for the BCT IG is posted at every company CP and at the BN Main CP.
    appendices: []
  - letter: V
    body: |
      Interagency coordination for IRON STRIKE is limited to U.S. Army Garrison Bavaria and the Bundeswehr. No Department of State, Department of Homeland Security, intergovernmental, or non-governmental organization activity is present in the area of operations. The Bavarian Red Cross provides medical standby at the Grafenwoehr Range Control clinic under the standing host-nation support agreement. All interagency touchpoints run through the BCT HN LNO; BN S-3 is the action officer and does not engage non-DoD partners at battalion level without BCT approval.
    appendices:
      - number: 1
        title: "Interagency Partner Liaison"
        body: |
          USAG Bavaria and Bundeswehr are the only interagency partners. Bavarian Red Cross medical standby at Range Control clinic. All coordination via BCT HN LNO.
  - letter: Z
    body: |
