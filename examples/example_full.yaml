situation:
  area_of_interest: >
    The area of interest extends 50 km beyond the AO boundary, encompassing
    HIGHWAY 22 eastbound to the BORDER (grid N7234) and all towns and
    transportation nodes that could resource enemy reinforcement of OBJ {{ obj_primary }}
    within 24 hours.
  area_of_operations:
    description: >
      AO IRON is bounded by PL STEEL (north), PL BRONZE (south), GRID LINE 23
      (west), and HIGHWAY 22 (east). Dominated by rolling mixed forest with
      cleared agricultural corridors north–south. See Annex C, Appendix 2
      (Operation Overlay).
    terrain:
      observation_and_fields_of_fire: >
        OBJ {{ obj_primary }} sits on a 340m ridgeline offering 3–4 km observation east;
        forest canopy restricts fields of fire to <200m off the ridge.
      avenues_of_approach: >
        Two platoon-sized mounted AAs from the south (ROUTE CLUB, ROUTE SPADE);
        one company-sized dismounted AA along the eastern treeline (ROUTE DIAMOND).
      key_terrain: >
        OBJ {{ obj_primary }} (MR-342 ridge). Decisive terrain: the eastern spur, grid
        NK 142 783, which controls observation of ENY fallback positions.
      obstacles: >
        Stream line along PL BRONZE (fordable for dismounts); mined wire obstacle
        belt templated vicinity NK 138 779 (IPB-confirmed).
      cover_and_concealment: >
        Dense coniferous cover throughout the AO; limited cover in the
        cleared-fields corridor (east-west). Urban cover in VIC ALTENSTADT (NK 115 790).
    weather:
      # Snapshot: single-line entries usable by short operations
      visibility: "8–10 km; daylight; reducing to 2 km with forecast afternoon precip."
      winds: "W 10–15 kt, gusts to 22 kt; favors friendly fires dispersion."
      precipitation: "40% chance intermittent rain 181400Z–182000Z; trafficability degraded on ROUTE CLUB."
      cloud_cover: "BKN 4,500 ft; overcast by 181800Z; CAS ceiling remains above 3,000 ft AGL."
      temperature_and_humidity: "Hi 14°C / Lo 4°C; RH 78%. Cold-weather injury risk LOW."
      light_data: "BMNT 0518Z · Sunrise 0558Z · Sunset 1818Z · EENT 1858Z · Moon 62% waxing gibbous"
      # Structured astronomical data for the critical decisive-day (19 APR 26)
      light_data_structured:
        date: "2026-04-19"
        bmnt: "0518Z"
        sunrise: "0558Z"
        sunset: "1818Z"
        eent: "1858Z"
        moonrise: "1612Z"
        moonset: "0341Z"
        moon_phase: "waxing gibbous"
        percent_illumination: 62
      # Climate baseline — seasonal norm for Grafenwoehr, Bavaria, mid-April
      climate_baseline: >
        Bavarian Oberpfalz late-April climatology: daytime 8–16°C, nightly 2–6°C;
        prevailing winds W/SW 8–12 kt; monthly precipitation ~55 mm (primarily
        afternoon showers); freeze risk LOW after 15 APR. Typical ceiling 3,500–
        8,000 ft with 40–60% probability of BKN mid-level cloud. Training area
        has historically experienced morning ground-fog episodes ≤2 km visibility
        until ~0700L in valleys (ROUTE CLUB east leg).
      # Phase-keyed forecast produced by BCT SWO (USAF Staff Weather Officer)
      forecast_by_period:
        - phase_or_day: "Phase I (Shaping, D-1 / 18 APR)"
          period_start: "180600ZAPR26"
          period_end: "190100ZAPR26"
          visibility: "10 km dropping to 2 km 181400Z–182000Z in showers."
          winds: "W 10–15 kt, gusts 22 kt."
          precipitation: "40% intermittent rain 181400–182000Z; 2–4 mm accum."
          cloud_cover: "BKN 4,500 ft, dropping to OVC 3,500 ft by 181800Z."
          temperature_and_humidity: "Hi 14°C / Lo 5°C; RH 70–85%."
          effects_on_operations: >
            FAVORS friendly reconnaissance (reduced ENY Orlan-10 utility in showers).
            Trafficability on ROUTE CLUB degraded post-1800Z — consider ASR SPADE for
            wheel traffic. CAS remains feasible; minimum ceiling >3,000 ft AGL.
        - phase_or_day: "Phase II (Decisive, D-Day / 19 APR, 0500Z–0800Z)"
          period_start: "{{ h_hour }}"
          period_end: "190800ZAPR26"
          visibility: "10+ km; clear to partly cloudy."
          winds: "W 8–12 kt, backing SW."
          precipitation: "Dry window; 10% POP."
          cloud_cover: "SCT 5,000 ft; CAS stack clear."
          temperature_and_humidity: "Hi 12°C (predicted peak 1400Z) / Lo 4°C at H-hour; RH 65%."
          light_data:
            date: "2026-04-19"
            bmnt: "0518Z"
            sunrise: "0558Z"
            sunset: "1818Z"
            eent: "1858Z"
            moon_phase: "waxing gibbous"
            percent_illumination: 62
          effects_on_operations: >
            FAVORS friendly airborne / dismounted assault. 62% illum supports NVG
            operations during H-hour window (BMNT 0518Z, LD at 0500Z). 12-min
            artillery prep timing matches usable first-light. VIPER 11/12 CAS ingress
            corridor clear. No obscurant needed for breach unless ENY counter-prep.
        - phase_or_day: "Phase III (Consolidate, D-Day to D+1 / 19–20 APR)"
          period_start: "190800ZAPR26"
          period_end: "{{ endex_dtg }}"
          visibility: "10 km; afternoon SCT 5,000 ft."
          winds: "W 10 kt."
          precipitation: "10% POP 192000Z–200200Z — monitor."
          cloud_cover: "SCT 5,000 ft; OVC 8,000 overnight."
          temperature_and_humidity: "Hi 15°C / Lo 3°C; RH 55–70%."
          effects_on_operations: >
            Transition and hand-off to 1-503 IN unaffected. Overnight low 3°C with
            wind chill ~0°C on OBJ {{ obj_primary }} ridge — enforce cold-weather precautions
            for personnel in static positions.
      effects_on_operations: >
        NET: weather FAVORS friendly operations across the campaign window.
        Decisive Phase II (190500–190800Z) executes in a confirmed dry, clear
        window with 62% NVG-usable illumination and ceilings well above CAS and
        UAS minimums. ENY Orlan-10 effectiveness reduced during Phase I precip
        windows. Principal risks: trafficability on ROUTE CLUB post-1800Z 18 APR
        (mitigate with ASR SPADE); overnight cold exposure in consolidation.
        No weather-driven branch or abort trigger anticipated.
      forecast_confidence: "HIGH — 72-hr forecast; synoptic pattern stable; SWO confidence HIGH."
      swo_product_reference: "Annex B, Appendix 1, Tab B (Weather). SWO Product 26-04-WX-019 (173d IBCT SWO, 181200ZAPR26)."
  enemy_forces:
    composition_disposition_strength: >
      Motorized rifle company (+) templated on OBJ {{ obj_primary }}; est. 120 PAX with
      4× BMP-2, 2× 82mm mortar, 1× ZU-23 AAA, engineer squad. Company is dug
      in, two platoons forward, one in reserve.
    recent_activities: >
      Over the past 72 hours, ENY has conducted dismounted patrols to PL BRONZE,
      emplaced obstacle belt NK 138 779, and rehearsed counterattack from the
      east using reinforcing elements.
    capabilities: >
      Defend in place; counterattack with a mounted platoon (+) within 2 hrs;
      disrupt with indirect fires from 82mm mortars out to 4 km; limited
      UAS (Orlan-10 templated) capability for ISR.
    most_likely_coa: >
      ENY defends OBJ {{ obj_primary }} with two platoons forward, uses obstacle belt
      and direct fire to canalize friendly attack into EA IRON, then
      counterattacks with mounted reserve from the east along ROUTE DIAMOND.
    most_dangerous_coa: >
      ENY pre-empts the attack with a spoiling raid at 180400Z against
      friendly assembly area at GRAFENWOEHR (OBJ TUNGSTEN), followed by
      deliberate defense of OBJ {{ obj_primary }} and commitment of a reinforcing
      company (+) from the EAST.
  friendly_forces:
    higher_headquarters:
      two_up_designation: "173d IBCT (A)"
      two_up_mission: >
        173d IBCT (A) conducts airborne assault NLT 170500ZAPR26 to seize
        OBJ FALCON (MR-310 key terrain complex) IOT set conditions for
        division follow-on ops in AO KNIGHT.
      two_up_intent: >
        Rapid seizure of key terrain to deny the enemy operational initiative.
        End state: OBJ FALCON under friendly control; enemy unable to
        reconstitute combat power; host-nation populace secure.
      one_up_designation: "2d Squadron / 503d IN / 173d IBCT (A)"
      one_up_mission: >
        2-503 IN attacks NLT {{ h_hour }} to seize OBJ {{ obj_primary }} IOT enable
        173d IBCT operations against OBJ FALCON.
      one_up_intent: >
        Mass combat power on OBJ {{ obj_primary }}; hand off to follow-on forces without
        losing tempo. End state: OBJ {{ obj_primary }} secured; 2-503 postured for
        follow-on to OBJ FALCON by 200600Z.
    adjacent_units: >
      NORTH: 1-503 IN conducts supporting attack to fix ENY on OBJ {{ obj_secondary }}.
      SOUTH: 4-319 AFAR provides GS fires. EAST: 173 RSTA conducts screen
      along HIGHWAY 22.
    other_units: >
      Host-nation Bundeswehr liaison element co-located at BCT MAIN CP for
      range deconfliction and civil coordination.
  interagency_intergovernmental_ngo: >
    Bundeswehr Grafenwoehr Training Area Command, Bavarian Red Cross (range
    medical standby), and USAG Bavaria coordinate on training-area access,
    safety, and emergency response.
  civil_considerations:
    areas: >
      Training area bounded by civilian farmland north of PL STEEL; civilian
      access to forest mushroom-gathering trails must be deconflicted.
    structures: >
      Protected: ALTENSTADT village chapel (NK 115 790); no direct or
      indirect fires within 500m. Historical marker at NK 121 788.
    capabilities: >
      Local Bundeswehr MP can respond to training incidents within 20 min;
      Vilseck hospital (Role 3 equivalent) 18 km east.
    organizations: >
      Bavarian Forestry Authority monitors live-fire boundary compliance.
    people: >
      Range workers (Bundeswehr civilians) transit range roads 0530–1800L.
      All movement on ROUTE CLUB between those times requires range-control
      clearance.
    events: >
      Easter holiday weekend active in adjacent villages; no impact on AO.
  attachments_and_detachments:
    attachments:
      - "2d Plt / A Co / 54th BEB (OPCON from 181800ZAPR26)"
      - "Btry B / 4-319 AFAR (DS from 180600ZAPR26)"
    detachments:
      - "Scout Plt / HHC / 2-503 IN (TACON to 173 RSTA, 180600ZAPR26–{{ endex_dtg }})"
    note: "See Annex A (Task Organization) for detailed relationships."
  assumptions:
    - "Weather remains flyable for CAS and MEDEVAC throughout the operation."
    - "Host-nation range clearance remains continuous through {{ endex_dtg }}."
    - "Enemy does not receive reinforcement of more than a platoon within 24 hrs."

mission: >
  {{ tf }} attacks NLT {{ h_hour }} to seize OBJ {{ obj_primary }} (vic. NK 142 783) IOT
  enable {{ bct }} follow-on operations against OBJ FALCON.

execution:
  commanders_intent:
    purpose: >
      Generate an overmatch of combat power on OBJ {{ obj_primary }} fast enough to
      preempt enemy counterattack and hand off the objective to follow-on
      forces with combat power intact.
    key_tasks:
      - "Seize OBJ {{ obj_primary }} with one company decisive, one shaping, one reserve."
      - "Defeat ENY reserve counterattack forward of PL BRONZE."
      - "Preserve combat power: less than 10% friendly casualties through consolidation."
      - "Maintain continuous fires and ISR coverage through transition to follow-on force."
    end_state: "OBJ {{ obj_primary }} under TF IRON control by 190900Z; ENY defeated in sector; TF postured for follow-on."
    end_state_friendly: "TF IRON consolidated on OBJ {{ obj_primary }}, >90% combat power, Class V at 70% basic load."
    end_state_enemy: "Enemy force on OBJ {{ obj_primary }} destroyed or forced to withdraw east of HIGHWAY 22."
    end_state_terrain: "OBJ {{ obj_primary }} (MR-342 ridge) and eastern spur under friendly control and observation."
    end_state_civil: "No civilian casualties; ALTENSTADT village and cultural sites unaffected."
  concept_of_operations:
    overview: >
      TF IRON executes a three-phase attack: PHASE I (Shaping, 180600Z–190500Z)
      — reconnaissance and shaping fires; PHASE II (Decisive, 190500Z–190800Z)
      — dismounted assault on OBJ {{ obj_primary }}; PHASE III (Consolidate, 190800Z–200600Z)
      — consolidate and hand off.
    maneuver: >
      A Co conducts the decisive operation as the main effort with dismounted
      assault along AA DIAMOND. B Co fixes ENY on OBJ {{ obj_secondary }}. C Co is reserve
      prepared to reinforce A Co or defeat counterattack. D Co provides
      direct-fire support from SBF-1 (NK 132 778).
    decisive_operation: >
      A Co assaults OBJ {{ obj_primary }} at 190500Z, seizes the ridge and eastern spur,
      and consolidates.
    shaping_operations: >
      B Co fixes the ENY platoon on OBJ {{ obj_secondary }}; SAPPER 2 breaches the wire
      obstacle belt at NK 138 779 NLT 190430Z; STEEL 6 delivers 12-minute
      artillery preparation on OBJ {{ obj_primary }} 190448Z–190500Z.
    sustaining_operations: >
      Combat Trains (CTCP) established vicinity NK 118 772 by 190400Z.
      Ambulance exchange point (AXP) at NK 125 776. CL III/V resupply by
      LMTV convoy from BSA every 8 hrs.
    reserve: >
      C Co is reserve, held at AA BRONZE, prepared to reinforce A Co (PRIORITY)
      or block enemy counterattack along ROUTE DIAMOND.
    fires: "See Annex D. Priority of fires to A Co during Phase II."
  scheme_of_movement_and_maneuver: >
    Phase I: B Co conducts supporting attack on OBJ {{ obj_secondary }} starting 180600Z.
    A Co moves to ASSAULT POSITION SABRE by 190430Z. Phase II: Breach
    complete 190445Z; artillery prep 190448–190500Z; A Co assaults
    190500–190700Z; consolidate 190700–190800Z. Phase III: Transfer of
    authority to follow-on force 200500Z.
  scheme_of_reconnaissance_and_security: >
    Scout Plt (TACON to 173 RSTA) screens along HIGHWAY 22 NLT 180600Z
    through 200600Z; provides early warning of eastern ENY movement. TF
    IRON R&S elements observe OBJ {{ obj_primary }} from OP 1 (NK 131 780) and OP 2
    (NK 144 785) from 181200Z.
  scheme_of_intelligence: >
    Focus on confirming ENY disposition on OBJ {{ obj_primary }}, validating obstacle
    belt composition, and warning of ENY reinforcement east of HIGHWAY 22.
    See Annex B.
  scheme_of_fires: >
    Priority of fires A Co (Phase II), then C Co (counterattack defeat).
    12-minute artillery prep on OBJ {{ obj_primary }} 190448–190500Z. CAS on call;
    final attack control by A Co JTAC.
  scheme_of_protection: >
    Priorities: (1) A Co assault element; (2) CTCP; (3) BN Main CP. OPSEC:
    radio silence below BN net until 190500Z. Personnel Recovery plan per
    Annex E, Appendix 9.
  stability: "Not applicable for this mission — limited to training area; no host-nation civilian effects beyond range deconfliction."
  scheme_of_engineer_operations: >
    SAPPER 2 breaches the wire obstacle belt NK 138 779 NLT 190445Z.
    Survivability effort focuses on CTCP and BN Main CP hasty positions.
    See Annex G.
  scheme_of_signal: >
    FM primary, TACSAT secondary. Battalion command net, fires net, and
    logistics net active. Data: Nett Warrior for COP. See Annex H.
  scheme_of_information_collection: >
    One Puma UAS orbit over OBJ {{ obj_primary }} 190430–190800Z tasked from BCT.
    Scout Plt (TACON) reports on HIGHWAY 22. See Annex L.
  scheme_of_sustainment: "See Paragraph 4 and Annex F."
  scheme_of_cema: >
    GPS, SATCOM, and FM remain unrestricted. No offensive cyber effects
    tasked at BN. EW detection alarm to BN S-2 on any jamming above threshold.
  scheme_of_military_deception: "No deception operation planned for this mission."
  assessment: >
    MOEs: (1) seizure of OBJ {{ obj_primary }} by 190900Z; (2) enemy combat power on
    OBJ {{ obj_primary }} reduced below 30%; (3) friendly casualties below 10%.
    MOPs: breach complete NLT 190445Z; artillery rounds on target per TVA;
    transition to follow-on NLT 200600Z. See Annex M.
  tasks_to_subordinate_units:
    - unit: "A Co / 2-503 IN"
      callsign: "ABLE 6"
      purpose: "Seize OBJ {{ obj_primary }} as decisive operation."
      tasks:
        - "Move to ASSAULT POSITION SABRE NLT 190430Z."
        - "Assault OBJ {{ obj_primary }} along AA DIAMOND commencing 190500Z."
        - "Clear eastern spur NLT 190700Z."
        - "Consolidate and prepare to defend NLT 190800Z."
      priorities: "CL V resupply (PRI 1); MEDEVAC lift (PRI 2)."
    - unit: "B Co / 2-503 IN"
      callsign: "BRAVO 6"
      purpose: "Fix ENY platoon on OBJ {{ obj_secondary }} to prevent reinforcement of OBJ {{ obj_primary }}."
      tasks:
        - "Conduct supporting attack against OBJ {{ obj_secondary }} NLT 180600Z."
        - "Maintain pressure through 190700Z."
        - "Be prepared to transition to reserve at BN direction."
    - unit: "C Co / 2-503 IN"
      callsign: "CHARLIE 6"
      purpose: "Serve as TF reserve; defeat ENY counterattack or reinforce A Co."
      tasks:
        - "Occupy AA BRONZE NLT 190300Z."
        - "On order, reinforce A Co on OBJ {{ obj_primary }}."
        - "On order, defeat ENY mounted counterattack along ROUTE DIAMOND."
    - unit: "D Co (Weapons) / 2-503 IN"
      callsign: "DOG 6"
      purpose: "Provide direct fire support from SBF-1."
      tasks:
        - "Occupy SBF-1 (NK 132 778) NLT 190415Z."
        - "Provide direct fire support to A Co assault."
        - "Displace to alt SBF-2 on A Co JTAC call."
    - unit: "2d Plt / A Co / 54th BEB"
      callsign: "SAPPER 2"
      purpose: "Breach ENY obstacle belt to enable A Co assault."
      tasks:
        - "Breach wire obstacle belt NK 138 779 NLT 190445Z."
        - "Mark breach lanes IAW BCT SOP."
        - "Be prepared to reduce follow-on obstacles on order."
    - unit: "Btry B / 4-319 AFAR"
      callsign: "STEEL 6"
      purpose: "Provide direct support fires to TF IRON."
      tasks:
        - "Deliver 12-minute preparation on OBJ {{ obj_primary }} 190448–190500Z."
        - "Maintain priority of fires to A Co through consolidation."
        - "Be prepared to shift to counterbattery on BN S-3 call."
  coordinating_instructions:
    effective_time: "This OPORD is effective 181200ZAPR26."
    ccir:
      pir:
        - "Is the ENY obstacle belt at NK 138 779 mined or wire only?"
        - "What is the ENY reserve posture east of HIGHWAY 22?"
        - "Has ENY employed UAS ISR over the AO?"
      ffir:
        - "Any friendly unit below 75% combat power."
        - "Loss of communications with any company commander for >15 min."
        - "Breach asset (SAPPER 2) combat-ineffective."
    eefi:
      - "Exact DTG of breach."
      - "Location of TF reserve (C Co)."
      - "Artillery firing position of STEEL 6."
    fscm: "Coordinated Fire Line along PL BRONZE. No-fire area 500m radius around ALTENSTADT village (NK 115 790)."
    acm: "Restricted Operations Zone over OBJ {{ obj_primary }} 190400–190800Z to 5,000 ft AGL for friendly UAS."
    roe: "Standard ROE per theater directive; hostile act / hostile intent only. Positive ID required for all direct fire."
    risk_reduction_control_measures: >
      All live-fire conducted under range-safety oversight. Chemlight
      recognition signals for night movement. No-fire 500m bubble around
      ALTENSTADT. MOPP level 0 (mission-tailored).
    personnel_recovery: "Isolated-personnel reporting to BN TOC; recovery by C Co on order. ISOPREP current for all personnel."
    environmental_considerations: "No pyrotechnic use within 100m of ALTENSTADT; fuel/waste returned to BSA."
    themes_and_messages:
      - "We train hard to fight and win."
      - "We honor our host-nation partners."
      - "Every paratrooper is accountable."
    cema: "EW detection reports directly to BN S-2; no offensive effects at BN level."
    other: "All personnel will consume 4 L water/day minimum during operations. Hot meals pushed from BSA every 12 hrs."

sustainment:
  logistics:
    sustainment_overlay: "See Annex F, Appendix 1."
    maintenance: >
      Field-level maintenance at CTCP (NK 118 772). Controlled exchange
      authorized for CL IX parts below $500. BDAR authority: Co Cdrs.
    transportation: >
      MSR CLUB (primary), ASR SPADE (alternate). Ambulance exchange at
      AXP at NK 125 776. Convoys in packets of 4 vehicles minimum.
    supply: >
      CL I: MRE for 3 days, hot meal push 2x/day. CL III: LOGPAC every
      8 hrs. CL V: 100% basic load carried, resupply pre-positioned at
      CTCP. CL VIII: See AHS below. Water: 4 L/soldier/day.
    field_services: "Mortuary affairs collection point at CTCP. Shower/laundry at BSA every 72 hrs."
    distribution: "Supply point distribution at CTCP; unit distribution forward to company trains on call."
    contract_support: "Range ammunition support via Bundeswehr contract; coordinated through BCT S-4."
  personnel_services:
    human_resources_support: "PERSTAT every 6 hrs via BN S-1. R&R policy per BCT directive."
    financial_management: "No finance operations in AO; reachback to BCT FMSC as needed."
    legal_support: "BN JAG available via BCT SJA. ROE questions to BN S-3; detainee legal review by BCT SJA."
    religious_support: "UMT circulates among companies every 24 hrs. Memorial services on order."
  health_services:
    medical_command_and_control: "BN Surgeon runs casualty ops from BN TOC; coordination with BCT Role 2 at BSA."
    medical_treatment: >
      Role 1 at each company trains; BN aid station at CTCP (NK 118 772).
      Role 2 at BSA (Grafenwoehr main); Role 3 at Vilseck (18 km east).
    medical_evacuation: >
      Ground MEDEVAC via AXP at NK 125 776. Air MEDEVAC on call from
      BCT Role 2 pad; 9-line to BN TOC on BN CMD net.
