annexes:
  - letter: A
    body: |
      Task Force IRON is organized around three maneuver companies, a weapons company, and task-organized enablers to seize OBJ {{ obj_primary }} NLT {{ h_hour }}. A Co (ABLE 6) is the decisive operation and main effort throughout Phase II, task-organized with 2d Plt/A/54 BEB (SAPPER 2) OPCON from 181800ZAPR26 for mobility and breach. B Co (BRAVO 6) is a shaping effort, attacks to fix enemy forces on OBJ {{ obj_secondary }} from 190430ZAPR26, and transitions to supporting effort for consolidation. C Co (CHARLIE 6) is the battalion reserve, postured vic. AA EAGLE NK 112 768, prepared to reinforce A Co, conduct counterattack against enemy mechanized reinforcement from the north, or assume A Co's mission on order.

      D Co Weapons (DOG 6) provides direct-fire overwatch from SBF 1 (NK 135 776) and SBF 2 (NK 139 777) with TOW and .50 cal sections, priority to A Co Phase I–II then C Co Phase III. Btry B/4-319 AFAR (STEEL 6) is direct support to 2-503 IN from 181200ZAPR26 through {{ endex_dtg }}; priority of fires shifts in accordance with Annex D. Scout Plt operates TACON to 173 RSTA SQDN through 190430ZAPR26, then chops back to 2-503 IN control as the battalion's organic recon asset in zone.

      Main effort is A Co through seizure of OBJ {{ obj_primary }}; supporting efforts are B Co (fix on OBJ {{ obj_secondary }}) and D Co Weapons (DF support). Reserve is C Co. Unit integrity is preserved at platoon level or higher; no cross-attachments below company without BN CDR approval. All OPCON and DS relationships terminate NLT {{ endex_dtg }} unless extended by FRAGO.
    appendices: []
  - letter: B
    typed_body:
      letter: B
      priority_intelligence_requirements:
