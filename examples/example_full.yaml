    body: |
      The concept of operations expands the base order's scheme of maneuver across three phases. In Phase I (Shaping, 180600Z–{{ h_hour }}), B Co conducts a feint toward OBJ {{ obj_secondary }} to fix the enemy's southern platoon while Scout Plt screens HIGHWAY 22 and confirms the enemy template. In Phase II (Decisive, 190500Z–190800ZAPR26), A Co, following SAPPER 2's breach of the obstacle belt at NK 138 779, assaults along AXIS GOLD to seize OBJ {{ obj_primary }}. In Phase III (Consolidate, 190800Z–{{ endex_dtg }}), TF IRON reorganizes on OBJ {{ obj_primary }}, establishes hasty defense oriented north, and prepares to hand the objective off to 1-503 IN for follow-on operations against OBJ FALCON.

      The Operation Overlay (App 2) depicts AA EAGLE, AXIS GOLD, PL SILVER (LD), PL BRONZE (FSCL/CFL), PL COPPER (LOA), OBJ {{ obj_primary }}, OBJ {{ obj_secondary }}, and SBFs 1 and 2. The Decision Support Matrix (App 3) addresses three decision points: DP1 — commit reserve (trigger: A Co combat power below 70% prior to PL BRONZE); DP2 — shift fires to counter reinforcement (trigger: enemy platoon (+) south of GRID LINE 80 on HIGHWAY 22); DP3 — transition to Phase III (trigger: OBJ {{ obj_primary }} cleared, no enemy activity within 2 km for 30 minutes).

      Branches addressed: (1) enemy reinforces early — C Co assumes blocking position vic. NK 128 787, fires shift to interdict HIGHWAY 22; (2) obstacle belt exceeds template — SAPPER 2 executes deliberate breach with second MICLIC, A Co delays assault 30 minutes, B Co extends fix on OBJ {{ obj_secondary }}. Sequel is battle handover to 1-503 IN NLT 200400ZAPR26 IVO OBJ {{ obj_primary }}, TF IRON retrograde to AA EAGLE for refit.
