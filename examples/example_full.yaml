      cde_guidance:
        commanders_guidance: |
          CDE posture for {{ op_name }} is MINIMUM FORCE with preference for precision PGM delivery.
          Default to CDE-3 weaponeering for any target within 1 km of ALTENSTADT NFA or designated
          NSL entries. CDE-4 and above require BCT Cdr concurrence prior to JFLCC submission.
          Dynamic re-tasking inside ROZ HAMMER during Phase II retains TYPE-2 JTAC control; danger-close
          engagements require ground-commander initials per 9-line remarks field.
        weaponeering_methodology: "Joint Munitions Effectiveness Manual (JMEM) + Precision Strike Suite (PSS-SOF) v6.1"
        loac_review_authority: "CJTF SJA (BCT OSJA for CDE-1/2 expedited review)"
        no_strike_list_reference: "USAREUR-AF NSL v2026-04-15 (incl. ALTENSTADT church/school cluster)"
        restricted_target_list_reference: "CJTF RTL v2026-04-17 (incl. host-nation critical infrastructure on GRAF range)"
        documentation_requirements:
          - "Target folder (imagery, PID evidence, pattern-of-life)"
          - "Weaponeering worksheet (JMEM / PSS-SOF output)"
          - "CDE worksheet (CJCSI 3160.01 Appendix A) for CDE-2 and above"
          - "LOAC review memo for CDE-3 and above"
          - "Senior-commander concurrence memo for CDE-4/5"
        additional_notes: |
          Dynamic targeting abort codes: "THUNDER" (abort weapons release), "CEASE" (withhold and
          re-engage). NGO aid convoys declared through JOC; 500m standoff applies absent explicit
          JFLCC override. All civilian-vehicle PID reversals trigger automatic re-qualification to CDE-3.
        levels:
          - level: "CDE-1"
            name: "Target Validation"
            description: |
              Confirm target identity, positive location, current activity, and absence of collateral
              concerns within the weapon effects radius. No further CDE steps required if all three
              conditions satisfied and no No-Strike List or Restricted Target List entry lies within
              blast / fragmentation radius.
            engagement_authority: "Tactical commander (BN CDR, BCT CDR for BCT-controlled assets)"
            documentation_required:
              - "Target folder summary"
              - "Imagery / sensor confirmation of PID"
              - "NSL / RTL deconfliction statement"
          - level: "CDE-2"
            name: "Collateral Object Identification"
            description: |
              Positive identification of collateral concerns (civilians, protected facilities per LOAC,
              NSL / RTL entries) within the effects radius of the planned weapon. Proceed to CDE-3 if
              concerns cannot be excluded from the effects area through PID alone.
            engagement_authority: "Tactical commander with mitigation memo"
            documentation_required:
              - "CDE-1 package plus"
              - "Collateral-object inventory (category, location, population estimate if civilian)"
              - "Mitigation strategy (timing, approach, angle)"
          - level: "CDE-3"
            name: "Weaponeering"
            description: |
              Adjust weapon selection and delivery parameters to place collateral concerns outside the
              weapon effects radius. Options include lower-yield munitions, delay / penetrator fusing,
              angle-of-attack restrictions, and precision PGM substitution. Weaponeering worksheet
              (JMEM / PSS) documents the selected combination.
            engagement_authority: "Operational commander (Division / JTF level); delegated to BCT CDR for pre-approved target sets"
            documentation_required:
              - "CDE-2 package plus"
              - "Weaponeering worksheet (JMEM / PSS output)"
              - "LOAC review memo (CJTF SJA)"
          - level: "CDE-4"
            name: "Risk Assessment"
            description: |
              Where collateral concerns remain inside the weapon effects radius after weaponeering,
              quantify the probability of significant damage using PSS-SOF or equivalent methodology.
              Risk threshold for proceeding is established by the approval authority.
            engagement_authority: "Senior operational commander (JTF / COCOM)"
            documentation_required:
              - "CDE-3 package plus"
              - "Quantitative risk assessment (PSS-SOF v6.1)"
              - "LOAC review endorsement (OSJA / SJA)"
          - level: "CDE-5"
            name: "Casualty Estimation"
            description: |
              Formal casualty estimation required when probable non-combatant casualty count exceeds
              the established threshold (typically 30 or category-specific). CDE-5 package reviewed at
              theater or national level; approval retained at SECDEF / CJCS for Category 1 targets.
            engagement_authority: "SECDEF or delegated authority for CAT-1 targets; CJCS / COCOM for others"
            documentation_required:
              - "CDE-4 package plus"
              - "Formal CDE-5 worksheet (CJCSI 3160.01 App A)"
              - "Theater-level LOAC review"
              - "Senior-commander concurrence memo"
