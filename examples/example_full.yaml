    body: |
      Priority of fires is A Co during Phase I–II through seizure of OBJ {{ obj_primary }}, then shifts to C Co during Phase III for counterattack defeat. STEEL 6 (Btry B/4-319 AFAR, 6x M119A3) executes a 12-minute preparation from 190448ZAPR26 to {{ h_hour }} on OBJ {{ obj_primary }}, targeting enemy platoon battle positions, the 82mm mortar section, and the ZU-23 position, followed by shift fires to suppress the reverse slope as A Co crosses PL SILVER. CAS is on-call through the BCT JTAC stack, with two F-16 sorties on 30-minute strip alert from Spangdahlem, callsigns VIPER 11/12.

      Fire Support Coordination Measures: CFL along PL BRONZE effective {{ h_hour }}; NFA 500m radius around ALTENSTADT village vic. NK 115 790 effective throughout the operation; RFA over BSA and CTCP; coordinated fire line advances to PL COPPER at transition to Phase III. FSCOORD (STEEL 6) clears all fires forward of PL SILVER through BN CDR or XO. Counterfire radar coverage is provided by BCT Q-53 cueing to STEEL 6 within 3 minutes of enemy indirect fire.

      Attack Guidance Matrix: HPTs are engaged with priority — enemy CP (neutralize, artillery, immediate); ZU-23 (destroy, CAS or artillery, immediate); mortar section (neutralize, artillery, immediate); BMP-2s (destroy, Javelin/TOW/CAS, as acquired); Orlan-10 GCS (destroy, artillery on BCT cueing). Ammunition priority is DPICM-equivalent HE, smoke for breach obscuration at 190440ZAPR26, and illumination on call.
    appendices:
      - number: 1
        title: "Field Artillery Support"
        body: |
          Btry B/4-319 AFAR DS to 2-503 IN from 181200ZAPR26; PAA vic. NK 105 762. Basic load 180 rounds HE, 30 smoke, 20 illumination per tube; Class V resupply pre-positioned at BSA.
      - number: 2
        title: "Air Support"
        body: |
          Two F-16 sorties on 30-minute strip alert from Spangdahlem AB, callsigns VIPER 11/12, controlled by JTAC (embedded with A Co main CP). CAS check-in on BN FIRES net; 9-line format per JP 3-09.3.
      - number: 4
        title: "Air and Missile Defense"
        body: |
          No organic ADA; passive air defense measures in effect (dispersion, camouflage, early warning). Counter-UAS priority against Orlan-10; report all UAS sightings via SPOTREP with DRAW-D.
      - number: 5
        title: "Targeting"
        body: |
          Targeting working group convenes at BN TOC 181800ZAPR26 and 190000ZAPR26. HPTL, TSS, and AGM published as products of the targeting cycle; S-2 and FSO co-chair.
  - letter: E
    body: |
      Protection priorities are, in order: A Co assault element during Phase II; CTCP vic. NK 118 772; BN Main CP vic. NK 110 765; Btry B firing position vic. NK 105 762. OPSEC posture is radio silence below BN level until {{ h_hour }}; BN CMD and O/I nets operate in EMCON-reduced with scheduled SITREPs only. Cover-and-concealment discipline enforced at AA EAGLE; no fires, no white light, and red-lens only from 181800ZAPR26 until LD.

      CBRN posture is MOPP 0, mission-tailored; enemy CBRN capability is assessed NIL. Personnel recovery plan is keyed to the BN isolated personnel report (ISOPREP) on file with BCT PR cell; primary PR force is C Co reserve, alternate is BCT QRF. Force Health Protection emphasizes tick and vector precaution (permethrin treatment of uniforms, daily tick checks) given the Bavarian spring operating environment; heat/cold risk is MODERATE overnight.

      Safety posture for the live-fire portions of the operation is governed by Grafenwoehr Range SOP and the BN range safety annex. Range OICs and RSOs are identified by company; medevac lanes are ground (primary) via MSR CLUB to Role 2 at BSA and air (alternate) to Landstuhl Regional Medical Center. All risk-mitigation measures from the DD Form 2977 are briefed to platoon level NLT 181800ZAPR26.
    appendices:
      - number: 2
        title: "Operations Security"
        body: |
          EEFI: timing of LD, obstacle breach location, reserve commitment criteria. EMCON-reduced until {{ h_hour }}; no personal electronic devices forward of AA EAGLE.
      - number: 4
        title: "Explosive Ordnance Disposal"
        body: |
          EOD support on-call from 54 BEB EOD section at BSA; response time 45 minutes to CTCP. Report all UXO via 9-line UXO report on BN O/I net.
      - number: 5
        title: "CBRN Operations"
        body: |
          MOPP 0, mission-tailored; M8/M9 paper issued to platoon level. BN CBRN NCO monitors atmospheric hazards and maintains downwind prediction if required.
      - number: 6
        title: "Safety"
        body: |
          Composite risk assessment MODERATE overall, HIGH during live-fire breach at NK 138 779. RSOs enforce range SOP; ground-guides required for all vehicle movement at AA EAGLE and BSA.
      - number: 9
        title: "Personnel Recovery"
        body: |
          ISOPREPs on file with BCT PR cell; EPA briefed to platoon leaders. Primary PR force is C Co reserve; alternate is BCT QRF with 60-minute response.
      - number: 11
        title: "Force Health Protection"
        body: |
          Permethrin-treated uniforms, daily tick checks, hydration plan (3L/day minimum). BAS at CTCP, Role 2 at BSA, Role 3 at Landstuhl. Cold-weather injury prevention briefed NLT 181800ZAPR26.
      - number: 12
        title: "Critical Asset List and Defended Asset List"
        body: |
          CAL: BN Main CP, CTCP, Btry B firing position, BSA. DAL prioritizes BN Main CP and Btry B; protected by dispersion, camouflage, and C Co reserve response.
  - letter: F
    body: |
      The Combat Trains Command Post establishes vic. NK 118 772 NLT 190400ZAPR26 under the HHC commander; the Brigade Support Area remains at Grafenwoehr main cantonment. LOGPACs cycle every 8 hours on MSR CLUB from BSA to CTCP, with push forward to company trains by the HHC 1SG. Ambulance Exchange Point is established vic. NK 125 776 operated by the BN BAS, with a second AXP co-located with the CTCP for Phase III.

      Class I is two hot meals plus MRE daily; Class III(B) resupply is by 2500-gal fuel tanker on the 0400Z LOGPAC; Class V is pre-positioned at the BSA with a full basic load plus 25% for contingency, released forward on call by S-4. Class VIII flows from BCT Role 2 on the BSA routine push; urgent Class VIII moves with MEDEVAC. Class IX repair parts are push-packaged by the BSB distribution company for the 48-hour operation.

      Personnel replacement and casualty reporting flow through the BN S-1 co-located at the CTCP; PERSTAT due every 6 hours. Mortuary affairs collection point is at the BSA, operated by the BSB MA team. Religious support is continuous from the BN UMT; legal support is reachback through BCT OSJA. Host-nation contracting through USAG Bavaria supports billeting and POL reachback.
    appendices:
      - number: 1
        title: "Logistics"
        body: |
          LOGPAC every 8 hours on MSR CLUB; CTCP vic. NK 118 772 NLT 190400ZAPR26. Classes I, III, V, VIII, IX managed by S-4 in coordination with BSB FSC.
      - number: 2
        title: "Personnel Services Support"
        body: |
          S-1 at CTCP manages strength reporting, replacement operations, and awards. PERSTAT every 6 hours on BN ADMIN net.
      - number: 3
        title: "Army Health System Support"
        body: |
          Role 1 BAS at CTCP; Role 2 at BSA; Role 3 reachback to Landstuhl Regional Medical Center. MEDEVAC launch authority at BN TOC; 9-line format on BN MEDEVAC net.
      - number: 5
        title: "Legal Support"
        body: |
          Reachback to BCT OSJA for ROE interpretation, Article 15 action, and investigations. BN S-1 handles first-line legal routing.
      - number: 6
        title: "Religious Support"
        body: |
          BN UMT (chaplain and RP) circulate between AA EAGLE, CTCP, and BAS; services at 181700ZAPR26 and {{ h_minus_2 }}. Crisis response on call via BN CMD net.
      - number: 7
        title: "Operational Contract Support"
        body: |
          USAG Bavaria contracting supports billeting, POL reachback, and DFAC services. No contractor forward of AA EAGLE.
      - number: 8
        title: "Mortuary Affairs"
        body: |
          MACP at BSA operated by BSB MA team. Human remains evacuation on dedicated vehicle; no collocation with Class I or VIII.
  - letter: G
    body: |
      The scheme of engineer operations is anchored on SAPPER 2 (2d Plt/A/54 BEB, OPCON from 181800ZAPR26) executing the breach of the wire and AT-ditch obstacle belt at NK 138 779 NLT 190445ZAPR26. SAPPER 2 employs one MICLIC on the primary lane (LANE RED) with a second MICLIC in reserve for LANE BLUE; lane-marking is VS-17 panels by day and chemlights by night, with far-side security provided by A Co 1st Plt. Countermobility is not planned in Phase I–II; in Phase III, SAPPER 2 emplaces a hasty point obstacle vic. NK 145 787 to canalize enemy reinforcement along HIGHWAY 22.

      Survivability effort prioritizes the CTCP and BN Main CP; SAPPER 2 provides a SEE (Small Emplacement Excavator) to dig in the TOC and CTCP vehicles NLT 190200ZAPR26. No mobility work is planned on MSR CLUB; the route is confirmed trafficable from Scout Plt reconnaissance NLT 190000ZAPR26. General engineering is limited given the training-area constraints and 48-hour operation window.

      Environmental considerations are significant: Grafenwoehr Training Area is a German federal training facility with strict restrictions on digging, tree removal, and watercourse crossing. All survivability positions are backfilled NLT 200400ZAPR26; no fires in wooded areas outside designated impact zones; spill response kits at every refuel point. Geospatial products (1:25,000 overprints, obstacle overlays, line-of-sight analysis) are pushed by BCT GEOINT cell through SharePoint and Nett Warrior.
    appendices:
      - number: 1
        title: "Mobility/Countermobility/Survivability"
        body: |
          SAPPER 2 breaches obstacle belt at NK 138 779 NLT 190445ZAPR26; survivability for CTCP and BN Main CP NLT 190200ZAPR26; Phase III point obstacle vic. NK 145 787.
      - number: 2
        title: "General Engineering"
        body: |
          Limited general engineering; no horizontal construction planned. Route maintenance on MSR CLUB by host-nation Bundeswehr range infrastructure as required.
      - number: 3
        title: "Geospatial Engineering"
        body: |
          BCT GEOINT cell pushes 1:25,000 overprints, obstacle overlays, and LOS analysis through SharePoint. BN S-2 integrates into SITEMP and targeting products.
      - number: 4
        title: "Environmental Considerations"
        body: |
          Backfill all survivability positions NLT 200400ZAPR26. No fires outside designated impact areas; spill kits at every refuel point. Report environmental incidents to BN S-3 immediately.
