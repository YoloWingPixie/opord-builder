          title: "Defend in sector on MR-342 ridge"
          narrative: "ENY MRC(+) defends the ridge with two platoons forward and one in reserve; fixes friendly forces forward of obstacle belt NK 138 779; defeats penetration by counterattack from the east with tank PLT from 3d MRR reserve along HIGHWAY 22."
