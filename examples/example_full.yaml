          primary_collector: "BCT Puma UAS orbit 190430-190800Z"
      high_value_target_list:
        - priority_rank: 1
          category: "C2"
          target_description: "ENY MRC Commander and CP (est. NK 142 783)"
          signature: "3-4 antenna vehicles, HMMWV-class tracks, VHF emissions 30-88 MHz"
