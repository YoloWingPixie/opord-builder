        - "Weather remains flyable for CAS and BCT Puma UAS throughout Phase II."
        - "GPS remains available; no degradation from Orlan-10 GCS co-located EW."
    body: |
      Enemy on OBJ {{ obj_primary }} is assessed as a reinforced motorized rifle company (+), approximately 120 pax, with 4x BMP-2, an 82mm mortar section, a ZU-23-2 AAA piece sited for ground role, and Orlan-10 UAS support cueing from regimental level. Enemy is dug in along the MR-342 ridge with primary positions on the eastern spur vic. NK 142 783, tied into a wire and AT-ditch obstacle belt at NK 138 779. Most dangerous COA is reinforcement by a motorized rifle platoon (+) from the north along HIGHWAY 22 within 90 minutes of contact; most likely COA is defense in sector with harassment by Orlan-10 and indirect fires from depth.

      PIRs drive collection: (1) location and timing of enemy reinforcement along HIGHWAY 22; (2) composition and condition of the obstacle belt at NK 138 779; (3) Orlan-10 launch/recovery site; (4) enemy CP vic. OBJ {{ obj_primary }}. HVTs are, in priority: enemy CO CDR, mortar FDC, ZU-23 crew, Orlan-10 GCS, and BMP section leaders. S-2 publishes updated SITEMPs, MCOOs, and the HVT list every 12 hours beginning 181800ZAPR26, pushed through SharePoint and Nett Warrior.

      BCT MICO provides reinforcing SIGINT and GEOINT products; 173 RSTA SQDN provides reconnaissance handover NLT {{ h_minus_2 }}. S-2 maintains the collection synchronization matrix (Annex L, Appendix 4) and deconflicts with BCT ACE. Counterintelligence focus is on insider threat during mission staging at Camp Aachen and host-nation contractor access to the BSA.
    appendices:
      - number: 1
        title: "Intelligence Estimate"
        body: |
          Running estimate maintained by S-2 and updated every 12 hours. Focus on enemy MLCOA/MDCOA, obstacle belt composition, and reinforcement triggers along HIGHWAY 22.
      - number: 2
        title: "Counterintelligence"
        body: |
          BCT CI team screens host-nation contractor access at BSA and conducts insider-threat awareness briefs prior to SP. No known FIS targeting of the training event.
      - number: 3
        title: "Signals Intelligence"
        body: |
          BCT MICO SIGINT platoon provides reinforcing collection against enemy C2 nets on OBJ {{ obj_primary }}; cueing pushed to S-2 within 15 minutes of detection. No organic BN SIGINT capability.
      - number: 4
        title: "Human Intelligence"
        body: |
          No HUMINT operations in the AO; all source interaction with role-players coordinated through BCT G-2X. Soldiers report observations through SALUTE on BN O/I net.
      - number: 5
        title: "Geospatial Intelligence"
        body: |
          BCT GEOINT cell provides 1:25,000 overprints of OBJ {{ obj_primary }} with updated obstacle and SITEMP overlays every 12 hours. Digital products pushed via SharePoint.
      - number: 6
        title: "Measurement and Signature Intelligence"
        body: |
          Not resourced at BN level; any MASINT tipping flows from BCT ACE. Report thermal or acoustic anomalies through SPOTREP.
      - number: 7
        title: "Open-Source Intelligence"
        body: |
          S-2 monitors host-nation press and social media for training-area disruption or protest activity. No adversary OSINT collection assessed.
      - number: 8
        title: "Technical Intelligence"
        body: |
          Recover and tag enemy equipment, documents, and UAS airframes (priority: Orlan-10 wreckage) for exploitation through BCT TECHINT cell. Do not disassemble on site.
