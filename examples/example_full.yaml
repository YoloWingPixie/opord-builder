# OPORD 26-04 — IRON STRIKE
# Training-scenario example exercising every field in the schema.

# `variables:` is Jinja-rendered into every string value before Pydantic
# validation. Define reusable values once and reference with {{ name }} or
# {{ nested.field }} anywhere in the document — including included fragments.
# This block is stripped before the schema sees the data.
