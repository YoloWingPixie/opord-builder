          title: "Spoiling attack from HIGHWAY 22"
          narrative: "ENY preempts with a mounted spoiling raid from HIGHWAY 22 at 180400Z against friendly assembly area; defeats TF IRON before LD; follows with deliberate defense of OBJ {{ obj_primary }} and commitment of reinforcing MRR company (+) from the east."
